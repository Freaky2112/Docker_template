services:
  app:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: Nginx-Proxy-Manager
    restart: unless-stopped
    ports:
      # These ports are in format <host-port>:<container-port>
      - '480:80' # Public HTTP Port
      - '443:443' # Public HTTPS Port
      - '81:81' # Admin Web Port
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    environment:
      # Mysql/Maria connection parameters:
      DB_MYSQL_HOST: "db"
      DB_MYSQL_PORT: 3306
      DB_MYSQL_USER: "indexer"
      DB_MYSQL_PASSWORD: "$^'ghjU,Me69L5dc3rcD^"
      DB_MYSQL_NAME: "npm"
      # Uncomment this if IPv6 is not enabled on your host
      # DISABLE_IPV6: 'true'

    depends_on:
      - db

  db:
    image: 'jc21/mariadb-aria:latest'
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: '4{(GC"\,0-s/SmXRL-1*?1~4{(GC"\,0-s/SmXRL-1*?'
      MYSQL_DATABASE: 'npm'
      MYSQL_USER: 'indexer'
      MYSQL_PASSWORD: '${^ghjU,Me69L5dc3rcD^'
      MARIADB_AUTO_UPGRADE: '1'
    volumes:
      - ./mysql:/var/lib/mysql
